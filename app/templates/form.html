<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Lumiere Billing Portal</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            margin: 0;
            padding: 40px;
        }

        .container {
            max-width: 700px;
            margin: auto;
            background: white;
            padding: 30px;
            border-radius: 14px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
        }

        h1 {
            margin-top: 0;
            color: #1f2937;
        }

        label {
            display: block;
            margin-top: 18px;
            font-weight: bold;
            color: #374151;
        }

        input, textarea {
            width: 100%;
            padding: 10px;
            margin-top: 6px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 14px;
        }

        button {
            margin-top: 25px;
            width: 100%;
            padding: 14px;
            background: #111827;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #374151;
        }

        .subtitle {
            color: #6b7280;
            margin-bottom: 25px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Lumiere Billing Portal</h1>
    <p class="subtitle">Generador de recibos de tarificación desde archivo CSV SCU200</p>

    <form action="/generar-pdf" method="post" enctype="multipart/form-data">
        <label>Nombre de la plaza</label>
        <input type="text" name="plaza" placeholder="Ej. Plaza Galerías Monterrey">

        <label>Logo de la plaza</label>
        <input type="file" name="logo_plaza">

        <label>Cliente / Local</label>
        <input type="text" name="cliente" placeholder="Ej. Local Salads">

        <label>Logo del cliente</label>
        <input type="file" name="logo_cliente">

        <label>Periodo facturado</label>
        <input type="text" name="periodo" placeholder="Ej. Marzo 2026">

        <label>Fecha de emisión</label>
        <input type="date" name="fecha">

        <label>Folio</label>
        <input type="text" name="folio" value="REC-000001">

        <label>Archivo CSV SCU200</label>
        <input type="file" name="csv_file">

        <label>Observaciones</label>
        <textarea name="observaciones" rows="4" placeholder="Este recibo fue generado con base en el reporte de tarificación SCU200."></textarea>

        <button type="submit">Generar PDF</button>
    </form>
</div>

</body>
</html>
